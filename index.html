<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手機行動庫存清點</title>
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        h2 { text-align: center; color: #333; }

        /* 新增品項表單 */
        .add-form { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .add-form input { width: calc(50% - 12px); padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        .add-form button { width: 97%; padding: 12px; margin: 5px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; }

        /* 庫存列表 */
        .item-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .item-info { flex-grow: 1; }
        .item-name { font-size: 18px; font-weight: bold; display: block; }
        .item-min { font-size: 12px; color: #888; }

        /* 控制按鈕 */
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-circle { width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 24px; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; touch-action: manipulation; }
        .btn-minus { background: #95a5a6; }
        .btn-plus { background: var(--primary); }
        
        /* 數字輸入框 */
        .qty-input { width: 50px; text-align: center; border: 1px solid #eee; font-size: 18px; font-weight: bold; padding: 5px; border-radius: 4px; -moz-appearance: textfield; }
        .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .low-stock { border-left: 5px solid var(--danger); }
        .low-stock .qty-input { color: var(--danger); }
    </style>
</head>
<body>

    <h2>📦 庫存快速清點</h2>

    <div class="add-form">
        <input type="text" id="newName" placeholder="品名 (例如：可樂)">
        <input type="number" id="newMin" placeholder="預警數量">
        <button onclick="addItem()">＋ 新增品項</button>
    </div>

    <div id="itemList"></div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('myInventory')) || [];

        function save() {
            localStorage.setItem('myInventory', JSON.stringify(inventory));
            render();
        }

        function addItem() {
            const name = document.getElementById('newName').value;
            const min = parseInt(document.getElementById('newMin').value) || 0;
            if (!name) return alert('請輸入品名');
            
            inventory.push({
                id: Date.now(),
                name: name,
                quantity: 0,
                min_stock: min
            });
            
            document.getElementById('newName').value = '';
            document.getElementById('newMin').value = '';
            save();
        }

        function updateQty(id, change) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                item.quantity = Math.max(0, item.quantity + change);
                save();
            }
        }

        function manualUpdate(id, value) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                item.quantity = Math.max(0, parseInt(value) || 0);
                save();
            }
        }

        function deleteItem(id) {
            if(confirm('確定要刪除此品項嗎？')) {
                inventory = inventory.filter(i => i.id !== id);
                save();
            }
        }

        function render() {
            const list = document.getElementById('itemList');
            list.innerHTML = '';

            inventory.forEach(item => {
                const isLow = item.quantity <= item.min_stock;
                const card = document.createElement('div');
                card.className = `item-card ${isLow ? 'low-stock' : ''}`;
                card.innerHTML = `
                    <div class="item-info" onclick="deleteItem(${item.id})">
                        <span class="item-name">${item.name}</span>
                        <span class="item-min">低於 ${item.min_stock} 預警</span>
                    </div>
                    <div class="controls">
                        <button class="btn-circle btn-minus" onclick="updateQty(${item.id}, -1)">−</button>
                        <input type="number" class="qty-input" value="${item.quantity}" 
                               onchange="manualUpdate(${item.id}, this.value)">
                        <button class="btn-circle btn-plus" onclick="updateQty(${item.id}, 1)">＋</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        render();
    </script>
</body>
</html>
