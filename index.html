<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>同步庫存系統</title>
    <style>
        :root { --primary: #3498db; --bg: #f4f7f6; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 600px; margin: auto; }
        
        /* 搜尋框 */
        .search-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; position: sticky; top: 10px; z-index: 100; }
        input#searchBar { width: 100%; padding: 12px; border: 2px solid #fbc02d; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fff9c4; }

        /* 產品卡片 */
        .product-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-title { font-size: 18px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 10px; color: #2c3e50; }
        
        /* 顏色子項樣式 */
        .variant-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        .variant-name { flex: 1; font-size: 16px; }
        .qty-display { font-size: 18px; font-weight: bold; color: var(--primary); padding: 0 15px; }
        
        .loading { text-align: center; padding: 20px; color: #888; }
        .refresh-btn { width: 100%; padding: 10px; background: #95a5a6; color: white; border: none; border-radius: 6px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 即時庫存清單</h2>
    <button class="refresh-btn" onclick="fetchData()">🔄 刷新資料 (同步電腦)</button>
    
    <div class="search-box">
        <input type="text" id="searchBar" placeholder="🔍 輸入產品名稱搜尋..." oninput="render()">
    </div>

    <div id="status" class="loading">讀取資料中...</div>
    <div id="productList"></div>
</div>

<script>
    // 配置區域
    const SPREADSHEET_ID = '1MyO8gr_3SUE2jhYfSYfWc-9J9oJlwBJu9PoTYr5Ea4E';
    const TAB_NAME = '工作表1'; // 如果你的分頁名稱不是"工作表1"，請修改這裡

    let inventoryData = [];

    async function fetchData() {
        document.getElementById('status').innerText = '正在同步表格數據...';
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(TAB_NAME)}`;
        
        try {
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            
            // 轉換資料格式
            const rawRows = json.table.rows;
            const tempMap = {};

            rawRows.forEach(row => {
                const pName = row.c[0] ? row.c[0].v : '';
                const variant = row.c[1] ? row.c[1].v : '預設';
                const qty = row.c[2] ? row.c[2].v : 0;

                if (!pName) return;

                if (!tempMap[pName]) {
                    tempMap[pName] = [];
                }
                tempMap[pName].push({ color: variant, qty: qty });
            });

            inventoryData = Object.keys(tempMap).map(name => ({
                name: name,
                variants: tempMap[name]
            }));

            document.getElementById('status').style.display = 'none';
            render();
        } catch (error) {
            document.getElementById('status').innerText = '讀取失敗，請確認表格是否已「發佈到網路」且 ID 正確。';
            console.error(error);
        }
    }

    function render() {
        const list = document.getElementById('productList');
        const searchTerm = document.getElementById('searchBar').value.toLowerCase();
        list.innerHTML = '';

        const filtered = inventoryData.filter(p => p.name.toLowerCase().includes(searchTerm));

        filtered.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            let variantsHtml = product.variants.map(v => `
                <div class="variant-row">
                    <div class="variant-name">${v.color}</div>
                    <div class="qty-display">${v.qty} 個</div>
                </div>
            `).join('');

            card.innerHTML = `<div class="product-title">${product.name}</div>${variantsHtml}`;
            list.appendChild(card);
        });
    }

    // 初始化讀取
    fetchData();
</script>
</body>
</html>
